<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
@font-face {
    font-family: 'MicroExtend';
    src: url('MPonderosa.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}
  :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --accent: #f97316;
      --accent-soft: #fb923c;
      --dark: #111111;
      --gray: #6b7280;
      --border: #e5e7eb;

      /* nuovi gradienti */
      --bg-gradient: linear-gradient(135deg, #eef2f7, #ffffff);
      --glass: rgba(255,255,255,0.6);
  }

.light {
    --bg: #111111;
    --card: #1f1f1f;
    --text: #f5f5f5;
    --border: #374151;
    --gray: #9ca3af;

    --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
    --glass: rgba(0,0,0,0.4);
}

body {
    margin: 0;
    font-family: Arial;
    background: var(--bg-gradient);
    color: var(--text);
    min-height: 100vh;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.3), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,0,0,0.2), transparent 50%);
    pointer-events: none;
    z-index: 0;
}

.container {
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 20px 24px;
    box-sizing: border-box;
    position: relative;
    z-index: 1;
}

.topbar {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 10px 14px;
    border-radius: 12px;
    background: var(--glass);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    z-index: 10;
}
.topbar div[style] {
    display:flex;
    align-items:flex-start;
    gap:4px;
}
.topbar div[style] img {
    height: 40px;
    background: transparent;
    padding: 0;
}
.topbar h2 {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text);
    text-transform: uppercase;
    font-size: 32px;
    letter-spacing: 0.8px;
    font-family: 'MicroExtend', Arial, sans-serif;
    margin: 0;
    white-space: nowrap;
}

.actions {
    display: flex;
    gap: 10px;
}

button {
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    font-weight: 600;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;

    /* effetto vetro */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);

    /* base glass */
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    isolation: isolate;
}

button.primary {
    background: linear-gradient(135deg, rgba(22,163,74,1), rgba(22,163,74,0.85));
}

button.secondary {
    background: linear-gradient(135deg, rgba(107,114,128,1), rgba(107,114,128,0.85));
}

button.delete {
    background: linear-gradient(135deg, rgba(220,38,38,1), rgba(220,38,38,0.85));
}

button.warning {
    background: linear-gradient(135deg, rgba(234,179,8,1), rgba(234,179,8,0.85));
}

button.success {
    background: linear-gradient(135deg, rgba(22,163,74,1), rgba(22,163,74,0.85));
}

button.info-btn {
    background: linear-gradient(135deg, rgba(59,130,246,1), rgba(59,130,246,0.85));
}

button.ordina-btn {
    background: linear-gradient(135deg, rgba(107,114,128,1), rgba(107,114,128,0.85));
    color: white;
}

button:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 12px 26px rgba(0,0,0,0.25);
    filter: brightness(1.2) saturate(1.1);
}

button:active {
    transform: translateY(0px) scale(0.97);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}


.toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    flex: 1;
}

.card {
    background: var(--glass);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    transition: all 0.2s ease;
    z-index: 1;
}

.info {
    flex: 1;
}

.buttons {
    display: flex;
    gap: 5px;
}

.scaduta { border-left: 5px solid var(--danger); }
.urgente { border-left: 5px solid var(--warning); }

.stats {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.stat {
    background: var(--glass);
    backdrop-filter: blur(10px);
    padding: 10px;
    border-radius: 10px;
    flex: 1;
    text-align: center;
    border: 1px solid var(--border);
    font-weight: 600;
    transition: all 0.2s ease;
}
.stat:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

.badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
    margin-left: 10px;
}
.alta { background: #ea580c; color: white; }
.media { background: #fb923c; color: white; }
.bassa { background: #6b7280; color: white; }
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--dark);
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 999;
    backdrop-filter: blur(10px);
}
.toast.show { opacity: 1; }
.edit-input {
    width: 100%;
    margin-bottom: 5px;
}
.dropzones {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}
.dropzone {
    flex: 1;
    padding: 10px;
    border: 2px dashed #555;
    border-radius: 10px;
    text-align: center;
    font-size: 12px;
    opacity: 0.7;
}
.kanban {
    display: flex;
    gap: 10px;
}
.col {
    flex: 1;
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 10px;
    min-height: 200px;
    transition: background 0.2s;
    transition: all 0.25s ease;
    z-index: 1;
}
.col:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(0,0,0,0.12);
}
.col.dragover {
    background: rgba(249,115,22,0.2);
}
.col h3 {
    text-align: center;
    margin-top: 0;
}
</style>
<style>
button::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    /* keep shine inside button while overflow is visible for badge */
    clip-path: inset(0 round 10px);
    background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.5s ease-out;
    pointer-events: none;
    z-index: 0;
    will-change: transform;
}

button:hover::after {
    transform: translateX(80%);
}
</style>
<style>
#notifBadge {
    transform-origin: center;
}

#notifBadge.active {
    animation: badgeBounce 1s ease-in-out infinite;
}

@keyframes badgeBounce {
    0%, 100% {
        transform: translateY(0) scale(1);
    }
    50% {
        transform: translateY(-3px) scale(1.12);
    }
}
</style>
</head>

<body style="overflow-x:hidden;">

<div class="container">

    <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px;">
            <img id="logo" src="logo.png" style="height:40px;">
        </div>
        <h2>Dashboard</h2>
        <div class="actions">
            <button class="secondary" onclick="filtra('tutte')">Tutte</button>
            <button onclick="filtra('urgenti')" class="warning">Urgenti</button>
            <button onclick="filtra('scadute')" class="delete">Scadute</button>
            <div style="position:relative; display:inline-block;">
                <button class="info-btn" onclick="toggleNotificheDropdown()">Notifiche</button>
                <span id="notifBadge" style="background:red;color:white;border-radius:50%;padding:2px 6px;font-size:10px;display:none;position:absolute;top:-8px;right:-8px;z-index:20;">0</span>
                <div id="notifDropdown" style="display:none; position:absolute; right:0; top:110%; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px; min-width:200px; box-shadow:0 4px 10px rgba(0,0,0,0.1); z-index:1000;">
                    <div id="notifContent">Nessuna notifica</div>
                </div>
            </div>
            <div id="userMenu" style="position:relative;">
                <button class="ghost" id="userBtn" onclick="toggleUserMenu()">
                    <span id="userLabel" style="font-weight:600;"></span> ▾
                </button>
                <div id="userDropdown" style="display:none; position:absolute; right:0; top:110%; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px; min-width:120px; box-shadow:0 4px 10px rgba(0,0,0,0.1); z-index:1000;">
                    <button class="secondary" style="width:100%; margin-bottom:6px;" onclick="openSettings()">Impostazioni</button>
                    <button class="secondary" style="width:100%;" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <div class="stats">
        <div class="stat" id="totali">Totali: 0</div>
        <div class="stat" id="urgenti">Urgenti: 0</div>
        <div class="stat" id="scadute">Scadute: 0</div>
    </div>

    <div class="toolbar">
        <input id="titolo" placeholder="Titolo">
        <input id="data" type="date">
        <select id="priorita">
            <option value="bassa">Bassa</option>
            <option value="media">Media</option>
            <option value="alta">Alta</option>
        </select>
        <button class="primary" onclick="aggiungi()">Aggiungi</button>
        <button class="ordina-btn" onclick="ordina()">Ordina</button>
        <select id="tipoOrdine" onchange="ordinaAvanzato()">
            <option value="data">Data</option>
            <option value="priorita">Priorità</option>
            <option value="titolo">Titolo</option>
        </select>
        <button class="secondary" onclick="resetFiltri()">Reset</button>
        <input placeholder="Cerca..." oninput="cerca(this.value)">
    </div>

    <div class="kanban">
        <div class="col" ondragover="allowDrop(event)" ondrop="drop(event, 'alta')">
            <h3>Alta</h3>
            <div id="col-alta"></div>
        </div>
        <div class="col" ondragover="allowDrop(event)" ondrop="drop(event, 'media')">
            <h3>Media</h3>
            <div id="col-media"></div>
        </div>
        <div class="col" ondragover="allowDrop(event)" ondrop="drop(event, 'bassa')">
            <h3>Bassa</h3>
            <div id="col-bassa"></div>
        </div>
    </div>

<div id="settingsOverlay" onclick="closeSettings()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:150;"></div>

<div id="settingsPanel" style="position:fixed; top:0; bottom:0; right:-100%; width:360px; max-width:90vw; box-sizing:border-box; background:var(--card); border-left:1px solid var(--border); box-shadow:-4px 0 12px rgba(0,0,0,0.1); transition:right 0.25s ease; z-index:200; padding:16px; display:flex; flex-direction:column; gap:12px; overflow-y:auto;">
    
    <h3>Impostazioni</h3>

    <label>Notifiche</label>
    <button class="info-btn" onclick="toggleNotifiche() " id="btnNotifiche">Attiva notifiche</button>

    <label>Ordinamento predefinito</label>
    <select id="defaultOrder" onchange="salvaImpostazioni()">
        <option value="data">Data</option>
        <option value="priorita">Priorità</option>
        <option value="titolo">Titolo</option>
    </select>

    <label>Tema</label>
    <button class="info-btn" onclick="toggleTheme()">Cambia tema</button>

    <div style="margin-top:auto;">
        <button class="secondary" onclick="closeSettings()">Chiudi</button>
    </div>

</div>

<div id="toast" class="toast"></div>

<script>
const API = "/scadenze";

function logout() {
    fetch('/logout')
    .then(() => {
        window.location.href = '/login';
    });
}
async function checkLogin() {
    try {
        const res = await fetch('/me');
        if (!res.ok) {
            window.location.href = '/login';
            return false;
        }
        const data = await res.json();
        if (!data.logged) {
            window.location.href = '/login';
            return false;
        }
        return true;
    } catch {
        window.location.href = '/login';
        return false;
    }
}

async function loadUser() {
    try {
        const res = await fetch('/me');
        if (!res.ok) return;
        const data = await res.json();
        if (data.logged) {
            const el = document.getElementById('userLabel');
            if (el) el.innerText = data.user.username;
        }
    } catch {}
}

function toggleUserMenu() {
    const menu = document.getElementById('userDropdown');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

function openSettings() {
    document.getElementById('settingsPanel').style.right = "0px";
    document.getElementById('settingsOverlay').style.display = "block";

    const saved = localStorage.getItem('tipoOrdine') || 'data';
    const sel = document.getElementById('defaultOrder');
    if (sel) sel.value = saved;

    document.getElementById('userDropdown').style.display = "none";
}

function closeSettings() {
    document.getElementById('settingsPanel').style.right = "-100%";
    document.getElementById('settingsOverlay').style.display = "none";
}

function salvaImpostazioni() {
    const val = document.getElementById('defaultOrder').value;
    localStorage.setItem('tipoOrdine', val);
    document.getElementById('tipoOrdine').value = val;
    ordinaAvanzato();
    showToast("Impostazioni salvate");
}

// chiusura menu clic fuori
document.addEventListener('click', function(e){
    const menu = document.getElementById('userMenu');
    if (!menu.contains(e.target)) {
        const dd = document.getElementById('userDropdown');
        if (dd) dd.style.display = 'none';
    }
});
let filtro = "tutte";
let datiGlobali = [];
let query = "";
let editingId = null;
let dragId = null;
let ordineAsc = true;
let tipoOrdineSalvato = localStorage.getItem("tipoOrdine") || "data";
let notificheAttive = localStorage.getItem("notifiche") === "true";
let listaNotifiche = [];
syncNotificheUI();
aggiornaBadge();
document.getElementById("tipoOrdine").value = tipoOrdineSalvato;

function giorniDiff(data) {
    const oggi = new Date();
    const d = new Date(data);
    return Math.ceil((d - oggi) / (1000*60*60*24));
}

function controllaScadenze() {
    if (!notificheAttive) return;

    datiGlobali.forEach(s => {
        const diff = giorniDiff(s.data_scadenza);

        // Notifica a 5 giorni o meno (non scadute)
        if (diff <= 5 && diff >= 0) {
            const msg = s.titolo + " - " + s.data_scadenza;

            // evita duplicati
            if (!listaNotifiche.includes(msg)) {
                listaNotifiche.push(msg);
                aggiornaBadge();
            }

            // notifica browser solo a 5 giorni esatti
            if (diff === 5) {
                new Notification("Scadenza tra 5 giorni", {
                    body: s.titolo
                });
            }
        }

        // oggi
        if (diff === 0) {
            new Notification("Scadenza oggi", {
                body: s.titolo
            });
        }

        // domani
        if (diff === 1) {
            new Notification("Scadenza domani", {
                body: s.titolo
            });
        }
    });
}

function filtra(tipo) {
    filtro = tipo;
    carica();
}

function cerca(val) {
    query = val.toLowerCase();
    render(datiGlobali);
}

async function carica() {
    const res = await fetch(API);
    const data = await res.json();
    datiGlobali = data;
    render(data);
}

async function aggiungi() {
    const titolo = document.getElementById("titolo").value;
    const data = document.getElementById("data").value;
    const priorita = document.getElementById("priorita").value;

    if (!titolo || !data) return alert("Compila tutto");

    await fetch(API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ titolo, data_scadenza: data, priorita })
    });

    carica();
    showToast("Aggiunto");
    document.getElementById("titolo").value = "";
    document.getElementById("data").value = "";
    document.getElementById("priorita").value = "bassa";
}

function modifica(id) {
    editingId = id;
    render(datiGlobali);
}

async function elimina(id) {
    await fetch(API + "/" + id, { method: "DELETE" });
    carica();
    showToast("Eliminato");
}

function toggleTheme() {
    document.body.classList.toggle("light");
    const isLight = document.body.classList.contains("light");
    localStorage.setItem("theme", isLight ? "light" : "dark");

    const logo = document.getElementById("logo");
    if (logo) {
        // dark mode = logo bianco, light = originale
        logo.src = isLight ? "logo-dark-clean-final.png" : "logo.png";
    }
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
}


function toggleNotifiche() {
    notificheAttive = !notificheAttive;
    localStorage.setItem("notifiche", notificheAttive);

    const btn = document.getElementById("btnNotifiche");
    if (btn) {
        btn.innerText = notificheAttive ? "Disattiva notifiche" : "Attiva notifiche";
    }

    showToast(notificheAttive ? "Notifiche attivate" : "Notifiche disattivate");
}

function syncNotificheUI() {
    const btn = document.getElementById("btnNotifiche");
    if (btn) {
        btn.innerText = notificheAttive ? "Disattiva notifiche" : "Attiva notifiche";
    }
}


function ordina() {
    ordinaAvanzato();
}

function ordinaAvanzato() {
    const tipo = document.getElementById("tipoOrdine").value;
    localStorage.setItem("tipoOrdine", tipo);

    datiGlobali.sort((a, b) => {
        if (tipo === "data") {
            return ordineAsc
                ? new Date(a.data_scadenza) - new Date(b.data_scadenza)
                : new Date(b.data_scadenza) - new Date(a.data_scadenza);
        }

        if (tipo === "titolo") {
            return ordineAsc
                ? a.titolo.localeCompare(b.titolo)
                : b.titolo.localeCompare(a.titolo);
        }

        if (tipo === "priorita") {
            const map = { alta: 3, media: 2, bassa: 1 };
            return ordineAsc
                ? map[b.priorita] - map[a.priorita]
                : map[a.priorita] - map[b.priorita];
        }

        return 0;
    });

    ordineAsc = !ordineAsc;
    render(datiGlobali);
    showToast("Ordinato per " + tipo);
}

function resetFiltri() {
    filtro = "tutte";
    carica();
}

function render(data) {
    let tot = data.length;
    let urg = 0;
    let sca = 0;

    const filtrati = data.filter(s => {
        if(query && !s.titolo.toLowerCase().includes(query)) return false;
        const diff = giorniDiff(s.data_scadenza);
        if (diff < 0) sca++;
        else if (diff <= 3) urg++;

        if (filtro === "urgenti") return diff <= 3 && diff >= 0;
        if (filtro === "scadute") return diff < 0;
        return true;
    });

    document.getElementById("totali").innerText = "Totali: " + tot;
    document.getElementById("urgenti").innerText = "Urgenti: " + urg;
    document.getElementById("scadute").innerText = "Scadute: " + sca;

    let htmlAlta = "";
    let htmlMedia = "";
    let htmlBassa = "";

    filtrati.forEach(s => {
        const diff = giorniDiff(s.data_scadenza);

        let classe = "";
        if (diff < 0) classe = "scaduta";
        else if (diff <= 3) classe = "urgente";

        let card = "";

        if(editingId === s.id){
            card = `
            <div class="card ${classe}">
                <div class="info">
                    <input class="edit-input" id="edit-titolo-${s.id}" value="${s.titolo}">
                    <input class="edit-input" id="edit-data-${s.id}" type="date" value="${s.data_scadenza}">
                    <select id="edit-priorita-${s.id}">
                        <option value="bassa" ${s.priorita==="bassa"?"selected":""}>Bassa</option>
                        <option value="media" ${s.priorita==="media"?"selected":""}>Media</option>
                        <option value="alta" ${s.priorita==="alta"?"selected":""}>Alta</option>
                    </select>
                </div>
                <div class="buttons">
                    <button class="success" onclick="salva(${s.id})">Salva</button>
                    <button class="warning" onclick="annulla()">Annulla</button>
                </div>
            </div>
            `;
        } else {
            card = `
            <div class="card ${classe}" draggable="true" ondragstart="drag(event, ${s.id})">
                <div class="info">
                    <b>${s.titolo}</b><br>
                    ${s.data_scadenza} (${diff} giorni)<br>
                    Priorità: <span class="badge ${s.priorita || 'bassa'}">${s.priorita || 'n/d'}</span>
                </div>
                <div class="buttons">
                    <button class="info-btn" onclick="modifica(${s.id})">Modifica</button>
                    <button class="delete" onclick="elimina(${s.id})">Elimina</button>
                </div>
            </div>
            `;
        }

        if(s.priorita === "alta") htmlAlta += card;
        else if(s.priorita === "media") htmlMedia += card;
        else htmlBassa += card;
    });

    document.getElementById("col-alta").innerHTML = htmlAlta;
    document.getElementById("col-media").innerHTML = htmlMedia;
    document.getElementById("col-bassa").innerHTML = htmlBassa;
}

function salva(id){
    const titolo = document.getElementById("edit-titolo-"+id).value;
    const data = document.getElementById("edit-data-"+id).value;
    const priorita = document.getElementById("edit-priorita-"+id).value;

    fetch(API + "/" + id, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ titolo, data_scadenza: data, priorita })
    }).then(() => {
        editingId = null;
        carica();
        showToast("Salvato");
    });
}

function annulla(){
    editingId = null;
    render(datiGlobali);
}

function drag(ev, id) {
    dragId = id;
}

function allowDrop(ev) {
    ev.preventDefault();
    ev.currentTarget.classList.add("dragover");
}

function drop(ev, nuovaPriorita) {
    ev.currentTarget.classList.remove("dragover");
    ev.preventDefault();
    if (!dragId) return;

    fetch(API + "/" + dragId, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            titolo: datiGlobali.find(x => x.id === dragId).titolo,
            data_scadenza: datiGlobali.find(x => x.id === dragId).data_scadenza,
            priorita: nuovaPriorita
        })
    }).then(() => {
        showToast("Priorità aggiornata");
        carica();
    });
}

});

document.querySelectorAll('.col').forEach(col => {
    col.addEventListener('dragleave', () => col.classList.remove('dragover'));
});

setInterval(controllaScadenze, 60000);
function aggiornaBadge() {
    const badge = document.getElementById("notifBadge");
    if (!badge) return;

    if (listaNotifiche.length > 0) {
        badge.style.display = "block";
        badge.innerText = listaNotifiche.length;
        badge.classList.add("active");
    } else {
        badge.style.display = "none";
        badge.classList.remove("active");
    }
}

function toggleNotificheDropdown() {
    const dd = document.getElementById("notifDropdown");
    const content = document.getElementById("notifContent");

    if (dd.style.display === "block") {
        dd.style.display = "none";
        return;
    }

    aggiornaBadge();

    if (listaNotifiche.length === 0) {
        content.innerText = "Nessuna notifica";
    } else {
        content.innerHTML = listaNotifiche.map(n => "<div>" + n + "</div>").join("");
    }

    dd.style.display = "block";
    listaNotifiche = [];
    aggiornaBadge();
}
