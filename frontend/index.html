<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:3000; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
<title>Dashboard</title>

<style>
@font-face {
    font-family: 'MicroExtend';
    src: url('MPonderosa.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}
  :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --accent: #f97316;
      --accent-soft: #fb923c;
      --dark: #111111;
      --gray: #6b7280;
      --border: #e5e7eb;

      /* nuovi gradienti */
      --bg-gradient: linear-gradient(135deg, #eef2f7, #ffffff);
      --glass: rgba(255,255,255,0.6);
  }

.light {
    --bg: #111111;
    --card: #1f1f1f;
    --text: #f5f5f5;
    --border: #374151;
    --gray: #9ca3af;

    --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
    --glass: rgba(0,0,0,0.4);
}

body {
    margin: 0;
    font-family: Arial;
    background: var(--bg-gradient);
    color: var(--text);
    min-height: 100vh;
    position: relative;
}

/* LIGHT THEME (default) */
body:not(.light)::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(249,115,22,0.18), transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(249,115,22,0.12), transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.25), transparent 60%);
    pointer-events: none;
    z-index: 0;
}

/* DARK THEME */
body.light::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,0,0,0.25), transparent 50%);
    pointer-events: none;
    z-index: 0;
}

.container {
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 20px 24px;
    box-sizing: border-box;
    position: relative;
    z-index: 1;
}

.topbar {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 10px 14px;
    border-radius: 12px;
    background: var(--glass);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    z-index: 10;
}
.topbar div[style] {
    display:flex;
    align-items:flex-start;
    gap:4px;
}
.topbar div[style] img {
    height: 40px;
    background: transparent;
    padding: 0;
}
.topbar h2 {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text);
    text-transform: uppercase;
    font-size: 32px;
    letter-spacing: 1px;
    font-family: 'MicroExtend', Arial, sans-serif;
    margin: 0;
    white-space: nowrap;
    font-weight: 400;
}

.actions {
    display: flex;
    gap: 10px;
}

button {
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    font-weight: 600;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;

    /* effetto vetro */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);

    /* base glass */
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    isolation: isolate;
}

button.primary {
    background: linear-gradient(135deg, rgba(22,163,74,1), rgba(22,163,74,0.85));
}

button.secondary {
    background: linear-gradient(135deg, rgba(107,114,128,1), rgba(107,114,128,0.85));
}

button.delete {
    background: linear-gradient(135deg, rgba(220,38,38,1), rgba(220,38,38,0.85));
}

button.warning {
    background: linear-gradient(135deg, rgba(234,179,8,1), rgba(234,179,8,0.85));
}

button.success {
    background: linear-gradient(135deg, rgba(22,163,74,1), rgba(22,163,74,0.85));
}

button.info-btn {
    background: linear-gradient(135deg, rgba(59,130,246,1), rgba(59,130,246,0.85));
}

button.ordina-btn {
    background: linear-gradient(135deg, rgba(107,114,128,1), rgba(107,114,128,0.85));
    color: white;
}

button:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 12px 26px rgba(0,0,0,0.25);
    filter: brightness(1.2) saturate(1.1);
}

button:active {
    transform: translateY(0px) scale(0.97);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}


.toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

input, select, textarea {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    flex: 1;
}

textarea {
    min-height: 74px;
    resize: vertical;
    font-family: inherit;
}

.card {
    background: var(--glass);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    transition: all 0.2s ease;
    z-index: 1;
}

.card.editing {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
}

.card.editing .info {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    width: 100%;
}

.card.editing .buttons {
    justify-content: flex-end;
    flex-wrap: wrap;
    width: 100%;
}

.info {
    flex: 1;
    min-width: 0;
}

.buttons {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
}

.scaduta { border-left: 5px solid var(--danger); }
.urgente { border-left: 5px solid var(--warning); }

.stats {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.stat {
    background: var(--glass);
    backdrop-filter: blur(10px);
    padding: 10px;
    border-radius: 10px;
    flex: 1;
    text-align: center;
    border: 1px solid var(--border);
    font-weight: 600;
    transition: all 0.2s ease;
}
.stat:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

.badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
    margin-left: 10px;
}
.alta { background: #ea580c; color: white; }
.media { background: #fb923c; color: white; }
.bassa { background: #6b7280; color: white; }
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--dark);
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 999;
    backdrop-filter: blur(10px);
}
.toast.show { opacity: 1; }
.edit-input {
    width: 100%;
    margin-bottom: 0;
    box-sizing: border-box;
}

.note {
    margin-top: 6px;
    white-space: pre-line;
}
.dropzones {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}
.dropzone {
    flex: 1;
    padding: 10px;
    border: 2px dashed #555;
    border-radius: 10px;
    text-align: center;
    font-size: 12px;
    opacity: 0.7;
}
.kanban {
    display: flex;
    gap: 10px;
}
.col {
    flex: 1;
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 10px;
    min-height: 200px;
    transition: background 0.2s;
    transition: all 0.25s ease;
    z-index: 1;
}
.col:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(0,0,0,0.12);
}
.col.dragover {
    background: rgba(249,115,22,0.2);
}
.col h3 {
    text-align: center;
    margin-top: 0;
}
</style>
<style>
button::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    /* keep shine inside button while overflow is visible for badge */
    clip-path: inset(0 round 10px);
    background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.5s ease-out;
    pointer-events: none;
    z-index: 0;
    will-change: transform;
}

button:hover::after {
    transform: translateX(80%);
}
</style>
<style>
#notifBadge {
    transform-origin: center;
}

#notifBadge.active {
    animation: badgeBounce 1s ease-in-out infinite;
}

@keyframes badgeBounce {
    0%, 100% {
        transform: translateY(0) scale(1);
    }
    50% {
        transform: translateY(-3px) scale(1.12);
    }
}
</style>
</head>

<body style="overflow-x:hidden;">

<div class="container">

    <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px;">
            <img id="logo" src="logo.png" style="height:40px;">
        </div>
        <h2>Dashboard</h2>
        <div class="actions">
            <button class="secondary" onclick="filtra('tutte')">Tutte</button>
            <button onclick="filtra('urgenti')" class="warning">Urgenti</button>
            <button onclick="filtra('scadute')" class="delete">Scadute</button>
            <div style="position:relative; display:inline-block;">
                <button class="info-btn" onclick="toggleNotificheDropdown()">Notifiche</button>
                <span id="notifBadge" style="background:red;color:white;border-radius:50%;padding:2px 6px;font-size:10px;display:none;position:absolute;top:-8px;right:-8px;z-index:20;">0</span>
                <div id="notifDropdown" style="display:none; position:absolute; right:0; top:110%; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px; min-width:200px; box-shadow:0 4px 10px rgba(0,0,0,0.1); z-index:1000;">
                    <div id="notifContent">Nessuna notifica</div>
                </div>
            </div>
            <div id="userMenu" style="position:relative;">
                <button class="ghost" id="userBtn" onclick="toggleUserMenu()">
                    <span id="userLabel" style="font-weight:600;"></span> ▾
                </button>
                <div id="userDropdown" style="display:none; position:absolute; right:0; top:110%; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px; min-width:120px; box-shadow:0 4px 10px rgba(0,0,0,0.1); z-index:1000;">
                    <button class="secondary" style="width:100%; margin-bottom:6px;" onclick="openSettings()">Impostazioni</button>
                    <button class="secondary" style="width:100%;" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <div class="stats">
        <div class="stat" id="totali">Totali: 0</div>
        <div class="stat" id="urgenti">Urgenti: 0</div>
        <div class="stat" id="scadute">Scadute: 0</div>
    </div>

    <div class="toolbar">
        <input id="cliente" placeholder="Cliente">
        <input id="prodotto" placeholder="Prodotto">
        <input id="tipo_licenza" placeholder="Tipo licenza">
        <input id="data" type="date">
        <input id="rinnovo" type="number" placeholder="Rinnovo (mesi)">
        <input id="note" placeholder="Note">
        <button class="primary" onclick="aggiungi()">Aggiungi</button>
        <button class="ordina-btn" onclick="ordina()">Ordina</button>
        <select id="tipoOrdine" onchange="ordinaAvanzato()">
            <option value="data">Data</option>
            <option value="priorita">Priorità</option>
            <option value="titolo">Cliente</option>
        </select>
        <button class="secondary" onclick="resetFiltri()">Reset</button>
        <input placeholder="Cerca cliente, prodotto, licenza o scadenza..." oninput="cerca(this.value)">
    </div>

    <div class="kanban">
        <div class="col" ondragover="allowDrop(event)" ondrop="drop(event, 'alta')">
            <h3>Alta</h3>
            <div id="col-alta"></div>
        </div>
        <div class="col" ondragover="allowDrop(event)" ondrop="drop(event, 'media')">
            <h3>Media</h3>
            <div id="col-media"></div>
        </div>
        <div class="col" ondragover="allowDrop(event)" ondrop="drop(event, 'bassa')">
            <h3>Bassa</h3>
            <div id="col-bassa"></div>
        </div>
    </div>

<div id="settingsOverlay" onclick="closeSettings()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:150;"></div>

<div id="settingsPanel" style="position:fixed; top:0; bottom:0; right:-100%; width:360px; max-width:90vw; box-sizing:border-box; background:var(--card); border-left:1px solid var(--border); box-shadow:-4px 0 12px rgba(0,0,0,0.1); transition:right 0.25s ease; z-index:200; padding:16px; display:flex; flex-direction:column; gap:12px; overflow-y:auto;">
    
    <h3>Impostazioni</h3>

    <label>Notifiche</label>
    <button class="info-btn" onclick="toggleNotifiche() " id="btnNotifiche">Attiva notifiche</button>

    <label>Ordinamento predefinito</label>
    <select id="defaultOrder" onchange="salvaImpostazioni()">
        <option value="data">Data</option>
        <option value="priorita">Priorità</option>
        <option value="titolo">Cliente</option>
    </select>

    <label>Tema</label>
    <button class="info-btn" onclick="toggleTheme()">Cambia tema</button>

    <div style="margin-top:auto;">
        <button class="secondary" onclick="closeSettings()">Chiudi</button>
    </div>

</div>

<div id="toast" class="toast"></div>

<script>
const API = "/scadenze";
const CLIENTI_API = "/clienti";

function logout() {
    fetch('/logout')
    .then(() => {
        window.location.href = '/login';
    });
}
async function checkLogin() {
    try {
        const res = await fetch('/me');
        if (!res.ok) {
            window.location.href = '/login';
            return false;
        }
        const data = await res.json();
        if (!data.logged) {
            window.location.href = '/login';
            return false;
        }
        return true;
    } catch {
        window.location.href = '/login';
        return false;
    }
}

async function loadUser() {
    try {
        const res = await fetch('/me');
        if (!res.ok) return;
        const data = await res.json();
        if (data.logged) {
            const el = document.getElementById('userLabel');
            if (el) el.innerText = data.user.username;
        }
    } catch {}
}

function toggleUserMenu() {
    const menu = document.getElementById('userDropdown');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

function openSettings() {
    document.getElementById('settingsPanel').style.right = "0px";
    document.getElementById('settingsOverlay').style.display = "block";

    const saved = localStorage.getItem('tipoOrdine') || 'data';
    const sel = document.getElementById('defaultOrder');
    if (sel) sel.value = saved;

    document.getElementById('userDropdown').style.display = "none";
}

function closeSettings() {
    document.getElementById('settingsPanel').style.right = "-100%";
    document.getElementById('settingsOverlay').style.display = "none";
}

function salvaImpostazioni() {
    const val = document.getElementById('defaultOrder').value;
    localStorage.setItem('tipoOrdine', val);
    document.getElementById('tipoOrdine').value = val;
    ordinaAvanzato();
    showToast("Impostazioni salvate");
}

// chiusura menu clic fuori
document.addEventListener('click', function(e){
    const menu = document.getElementById('userMenu');
    if (!menu.contains(e.target)) {
        const dd = document.getElementById('userDropdown');
        if (dd) dd.style.display = 'none';
    }
});
let filtro = "tutte";
let datiGlobali = [];
let query = "";
let editingId = null;
let dragId = null;
let clientiById = {};
let ordineAsc = true;
let tipoOrdineSalvato = localStorage.getItem("tipoOrdine") || "data";
let notificheAttive = localStorage.getItem("notifiche") === "true";
let listaNotifiche = [];
syncNotificheUI();
aggiornaBadge();
document.getElementById("tipoOrdine").value = tipoOrdineSalvato;

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function jsArg(value) {
    return escapeHtml(JSON.stringify(String(value)));
}

function domId(value) {
    return encodeURIComponent(String(value));
}

function apiUrl(id) {
    return API + "/" + encodeURIComponent(String(id));
}

function parseData(value) {
    if (!value) return null;
    if (value instanceof Date && !Number.isNaN(value.getTime())) return value;

    const raw = String(value).trim();
    let match = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (match) {
        return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    }

    match = raw.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})$/);
    if (match) {
        let first = Number(match[1]);
        let second = Number(match[2]);
        let year = Number(match[3]);
        const hasFullYear = match[3].length === 4;
        if (year < 100) year += 2000;

        const dayFirst = hasFullYear || first > 12;
        const day = dayFirst ? first : second;
        const month = dayFirst ? second : first;

        return new Date(year, month - 1, day);
    }

    const parsed = new Date(raw);
    return Number.isNaN(parsed.getTime()) ? null : parsed;
}

function formattaData(value) {
    const date = parseData(value);
    if (!date) return value || "";

    const day = String(date.getDate()).padStart(2, "0");
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const year = String(date.getFullYear());

    return `${day}/${month}/${year}`;
}

function dataPerInput(value) {
    const date = parseData(value);
    if (!date) return "";

    const day = String(date.getDate()).padStart(2, "0");
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const year = String(date.getFullYear());

    return `${year}-${month}-${day}`;
}

function nomeCliente(scadenza) {
    return scadenza.cliente || clientiById[scadenza.cliente_id] || "";
}

function normalizzaScadenza(scadenza) {
    return {
        ...scadenza,
        cliente: nomeCliente(scadenza),
        data_scadenza: formattaData(scadenza.data_scadenza)
    };
}

function normalizzaRicerca(value) {
    return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
}

function testoRicercaScadenza(s) {
    return normalizzaRicerca([
        nomeCliente(s),
        s.cliente_id,
        s.prodotto,
        s.tipo_licenza,
        s.data_scadenza,
        s.rinnovo_mensile,
        s.note
    ].join(" "));
}

function matchRicerca(s) {
    if (!query) return true;

    const parole = query.split(" ").filter(Boolean);
    const testo = testoRicercaScadenza(s);

    return parole.every(parola => testo.includes(parola));
}

function prioritaCalcolata(scadenza) {
    const diff = giorniDiff(scadenza.data_scadenza);
    if (diff <= 10 && diff >= 0) return "alta";
    if (diff > 10 && diff <= 30) return "media";
    if (diff > 30) return "bassa";
    return "alta";
}

function giorniDiff(data) {
    const oggi = new Date();
    oggi.setHours(0, 0, 0, 0);
    const d = parseData(data);
    if (!d) return 0;
    d.setHours(0, 0, 0, 0);
    return Math.ceil((d - oggi) / (1000*60*60*24));
}

function controllaScadenze() {
    if (!notificheAttive) return;

    datiGlobali.forEach(s => {
        const diff = giorniDiff(s.data_scadenza);

        // Notifica a 5 giorni o meno (non scadute)
        if (diff <= 5 && diff >= 0) {
            const msg = s.cliente + " - " + s.prodotto + " - " + formattaData(s.data_scadenza);

            // evita duplicati
            if (!listaNotifiche.includes(msg)) {
                listaNotifiche.push(msg);
                aggiornaBadge();
            }

            // notifica browser solo a 5 giorni esatti
            if (diff === 5) {
                new Notification("Scadenza tra 5 giorni", {
                    body: s.cliente + " - " + s.prodotto
                });
            }
        }

        // oggi
        if (diff === 0) {
            new Notification("Scadenza oggi", {
                body: s.cliente + " - " + s.prodotto
            });
        }

        // domani
        if (diff === 1) {
            new Notification("Scadenza domani", {
                body: s.cliente + " - " + s.prodotto
            });
        }
    });
}

function filtra(tipo) {
    filtro = tipo;
    carica();
}

function cerca(val) {
    query = normalizzaRicerca(val);
    render(datiGlobali);
}

async function carica() {
    const resScadenze = await fetch(API);
    let clienti = [];

    try {
        let resClienti = await fetch(CLIENTI_API);
        if (!resClienti.ok) {
            resClienti = await fetch('/clienti.json');
        }
        clienti = resClienti.ok ? await resClienti.json() : [];
    } catch {}

    clientiById = Object.fromEntries(clienti.map(c => [c.id, c.nome]));

    const data = await resScadenze.json();
    datiGlobali = Array.isArray(data) ? data.map(normalizzaScadenza) : [];
    render(datiGlobali);
}

async function aggiungi() {
    const cliente = document.getElementById("cliente").value;
    const prodotto = document.getElementById("prodotto").value;
    const tipo_licenza = document.getElementById("tipo_licenza").value;
    const data = document.getElementById("data").value;
    const rinnovo = document.getElementById("rinnovo").value;
    const note = document.getElementById("note").value;

    if (!cliente || !prodotto || !tipo_licenza || !data) {
        return alert("Compila tutti i campi obbligatori");
    }

    await fetch(API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            cliente,
            prodotto,
            tipo_licenza,
            data_scadenza: data,
            rinnovo_mensile: rinnovo,
            note
        })
    });

    carica();
    showToast("Aggiunto");

    document.getElementById("cliente").value = "";
    document.getElementById("prodotto").value = "";
    document.getElementById("tipo_licenza").value = "";
    document.getElementById("data").value = "";
    document.getElementById("rinnovo").value = "";
    document.getElementById("note").value = "";
}

function modifica(id) {
    editingId = String(id);
    render(datiGlobali);
}

async function elimina(id) {
    await fetch(apiUrl(id), { method: "DELETE" });
    carica();
    showToast("Eliminato");
}

function toggleTheme() {
    document.body.classList.toggle("light");
    const isLight = document.body.classList.contains("light");
    localStorage.setItem("theme", isLight ? "light" : "dark");

    const logo = document.getElementById("logo");
    if (logo) {
        // dark mode = logo bianco, light = originale
        logo.src = isLight ? "logo-dark-clean-final.png" : "logo.png";
    }
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
}


function toggleNotifiche() {
    notificheAttive = !notificheAttive;
    localStorage.setItem("notifiche", notificheAttive);

    const btn = document.getElementById("btnNotifiche");
    if (btn) {
        btn.innerText = notificheAttive ? "Disattiva notifiche" : "Attiva notifiche";

    showToast(notificheAttive ? "Notifiche attivate" : "Notifiche disattivate");
}

function syncNotificheUI() {
    const btn = document.getElementById("btnNotifiche");
    if (btn) {
        btn.innerText = notificheAttive ? "Disattiva notifiche" : "Attiva notifiche";
    }
}


function ordina() {
    ordinaAvanzato();
}

function ordinaAvanzato() {
    const tipo = document.getElementById("tipoOrdine").value;
    localStorage.setItem("tipoOrdine", tipo);

    datiGlobali.sort((a, b) => {
        if (tipo === "data") {
            return ordineAsc
                ? parseData(a.data_scadenza) - parseData(b.data_scadenza)
                : parseData(b.data_scadenza) - parseData(a.data_scadenza);
        }

        if (tipo === "titolo") {
            return ordineAsc
                ? a.cliente.localeCompare(b.cliente)
                : b.cliente.localeCompare(a.cliente);
        }

        if (tipo === "priorita") {
            const map = { alta: 3, media: 2, bassa: 1 };
            return ordineAsc
                ? map[prioritaCalcolata(b)] - map[prioritaCalcolata(a)]
                : map[prioritaCalcolata(a)] - map[prioritaCalcolata(b)];
        }

        return 0;
    });

    ordineAsc = !ordineAsc;
    render(datiGlobali);
    showToast("Ordinato per " + tipo);
}

function resetFiltri() {
    filtro = "tutte";
    carica();
}

function render(data) {
    let urg = 0;
    let sca = 0;

    const filtrati = data.filter(s => {
        if(!matchRicerca(s)) return false;

        const diff = giorniDiff(s.data_scadenza);
        if (diff < 0) sca++;
        else if (diff <= 3) urg++;

        if (filtro === "scadute") return diff < 0;
        if (filtro === "urgenti") return diff <= 3 && diff >= 0;
        return diff >= 0;
    });
    let tot = filtrati.length;

    document.getElementById("totali").innerText = "Totali: " + tot;
    document.getElementById("urgenti").innerText = "Urgenti: " + urg;
    document.getElementById("scadute").innerText = "Scadute: " + sca;

    let htmlAlta = "";
    let htmlMedia = "";
    let htmlBassa = "";

    filtrati.forEach(s => {
        const diff = giorniDiff(s.data_scadenza);
        const id = String(s.id);
        const safeDomId = domId(id);
        const safeJsId = jsArg(id);
        const clienteNome = nomeCliente(s);

        const prioritaAuto = prioritaCalcolata(s);

        let classe = "";
        if (diff < 0) classe = "scaduta";
        else if (diff <= 3) classe = "urgente";

        let card = "";

        if(editingId === id){
            card = `
            <div class="card editing ${classe}">
                <div class="info">
                    <input class="edit-input" id="edit-cliente-${safeDomId}" value="${escapeHtml(s.cliente)}" placeholder="Cliente">
                    <input class="edit-input" id="edit-prodotto-${safeDomId}" value="${escapeHtml(s.prodotto)}" placeholder="Prodotto">
                    <input class="edit-input" id="edit-tipo-${safeDomId}" value="${escapeHtml(s.tipo_licenza)}" placeholder="Tipo licenza">
                    <input class="edit-input" id="edit-data-${safeDomId}" type="date" value="${escapeHtml(dataPerInput(s.data_scadenza))}">
                    <input class="edit-input" id="edit-rinnovo-${safeDomId}" type="number" value="${escapeHtml(s.rinnovo_mensile || 0)}" placeholder="Rinnovo (mesi)">
                    <textarea class="edit-input" id="edit-note-${safeDomId}" placeholder="Note">${escapeHtml(s.note || "")}</textarea>
                </div>
                <div class="buttons">
                    <button class="success" onclick="salva(${safeJsId})">Salva</button>
                    <button class="warning" onclick="annulla()">Annulla</button>
                </div>
            </div>
            `;
        } else {
            card = `
            <div class="card ${classe}" draggable="true" ondragstart="drag(event, ${safeJsId})">
                <div class="info">
                    <b>Cliente: ${escapeHtml(clienteNome || "Cliente non trovato")}</b><br>
                    Prodotto: ${escapeHtml(s.prodotto)} - ${escapeHtml(s.tipo_licenza)}<br>
                    Scadenza: ${escapeHtml(formattaData(s.data_scadenza))} (${diff} giorni)<br>
                    Rinnovo: ${escapeHtml(s.rinnovo_mensile || 0)} mesi
                    ${s.note ? `<div class="note">Note: ${escapeHtml(s.note)}</div>` : ""}
                </div>
                <div class="buttons">
                    <button class="info-btn" onclick="modifica(${safeJsId})">Modifica</button>
                    <button class="delete" onclick="elimina(${safeJsId})">Elimina</button>
                </div>
            </div>
            `;
        }

        if (prioritaAuto === "alta") htmlAlta += card;
        else if (prioritaAuto === "media") htmlMedia += card;
        else htmlBassa += card;
    });

    document.getElementById("col-alta").innerHTML = htmlAlta;
    document.getElementById("col-media").innerHTML = htmlMedia;
    document.getElementById("col-bassa").innerHTML = htmlBassa;
}

function salva(id){
    const safeDomId = domId(id);
    const cliente = document.getElementById("edit-cliente-"+safeDomId).value.trim();
    const prodotto = document.getElementById("edit-prodotto-"+safeDomId).value.trim();
    const tipo_licenza = document.getElementById("edit-tipo-"+safeDomId).value.trim();
    const data = document.getElementById("edit-data-"+safeDomId).value;
    const rinnovo_mensile = document.getElementById("edit-rinnovo-"+safeDomId).value;
    const note = document.getElementById("edit-note-"+safeDomId).value.trim();

    if (!cliente || !prodotto || !tipo_licenza || !data) {
        return alert("Compila tutti i campi obbligatori");
    }

    fetch(apiUrl(id), {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ cliente, prodotto, tipo_licenza, data_scadenza: data, rinnovo_mensile, note })
    }).then(() => {
        editingId = null;
        carica();
        showToast("Salvato");
    });
}

function annulla(){
    editingId = null;
    render(datiGlobali);
}

function drag(ev, id) {
    dragId = id;
}

function allowDrop(ev) {
    ev.preventDefault();
    ev.currentTarget.classList.add("dragover");
}

function drop(ev, nuovaPriorita) {
    ev.currentTarget.classList.remove("dragover");
    ev.preventDefault();
    if (!dragId) return;

    const scadenza = datiGlobali.find(x => String(x.id) === String(dragId));
    if (!scadenza) return;

    fetch(apiUrl(dragId), {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            cliente: scadenza.cliente,
            prodotto: scadenza.prodotto,
            tipo_licenza: scadenza.tipo_licenza,
            data_scadenza: scadenza.data_scadenza,
            rinnovo_mensile: scadenza.rinnovo_mensile,
            note: scadenza.note,
            priorita: nuovaPriorita
        })
    }).then(() => {
        showToast("Priorità aggiornata");
        carica();
    });
}

function aggiornaBadge() {
    const badge = document.getElementById("notifBadge");
    if (!badge) return;

    if (listaNotifiche.length > 0) {
        badge.style.display = "block";
        badge.innerText = listaNotifiche.length;
        badge.classList.add("active");
    } else {
        badge.style.display = "none";
        badge.classList.remove("active");
    }
}

function toggleNotificheDropdown() {
    const dd = document.getElementById("notifDropdown");
    const content = document.getElementById("notifContent");

    if (dd.style.display === "block") {
        dd.style.display = "none";
        return;
    }

    aggiornaBadge();

    if (listaNotifiche.length === 0) {
        content.innerText = "Nessuna notifica";
    } else {
        content.innerHTML = listaNotifiche.map(n => "<div>" + n + "</div>").join("");
    }

    dd.style.display = "block";
    listaNotifiche = [];
    aggiornaBadge();
}
